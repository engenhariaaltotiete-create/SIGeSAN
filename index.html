<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SIGeSAN - Sistema de Gestão de Obras de Saneamento</title>
  <meta name="description" content="Sistema completo de gestão de obras, vistorias e orçamentos de saneamento." />

  <!-- Bootstrap 5 (CSS) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS próprio do sistema -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Favicon simples -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>💧</text></svg>">
</head>
<body>
  <div id="root">
    <div class="loading-overlay">
      <div class="text-center">
        <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
        <p class="mt-3 text-muted">Carregando SIGeSAN...</p>
      </div>
    </div>
  </div>

  <!-- React + ReactDOM (produção) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone: permite escrever JSX sem etapa de build (ideal para GitHub Pages) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Bootstrap JS (bundle com Popper) -- carregado em segundo plano; nenhum componente depende dele no boot -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js para os gráficos do dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Configuração -->
  <script src="js/config.js"></script>

  <!-- Utilitários -->
  <script type="text/babel" src="js/utils/helpers.js"></script>
  <script type="text/babel" src="js/api/api.js"></script>
  <script type="text/babel" src="js/store/DataStore.js"></script>

  <!-- Componentes reutilizáveis -->
  <script type="text/babel" src="js/components/Toast.js"></script>
  <script type="text/babel" src="js/components/Common.js"></script>
  <script type="text/babel" src="js/components/Layout.js"></script>

  <!-- Páginas -->
  <script type="text/babel" src="js/pages/DashboardPage.js"></script>
  <script type="text/babel" src="js/pages/ObrasListPage.js"></script>
  <script type="text/babel" src="js/pages/ObraFormPage.js"></script>
  <script type="text/babel" src="js/pages/ObraDetailPage.js"></script>
  <script type="text/babel" src="js/pages/VistoriasListPage.js"></script>
  <script type="text/babel" src="js/pages/VistoriaFormPage.js"></script>
  <script type="text/babel" src="js/pages/OrcamentosListPage.js"></script>
  <script type="text/babel" src="js/pages/OrcamentoFormPage.js"></script>

  <!-- App raiz -->
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
